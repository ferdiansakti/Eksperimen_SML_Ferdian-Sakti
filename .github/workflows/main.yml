name: Auto Preprocessing on Dataset Change

on:
  push:
    branches: [ main ]
    paths:
      - 'dataset_raw/**'

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas numpy scikit-learn scipy

      - name: Run automate script
        run: |
          python preprocessing/automate_Ferdian.py

      - name: Upload preprocessing result
        uses: actions/upload-artifact@v4
        with:
          name: preprocessing-result
          path: preprocessing/loan_preprocessing.csv